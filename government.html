<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFI Validation | 18 International Case Studies</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root { --gov-blue: #003366; --gov-red: #d9534f; --gov-green: #28a745; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #f8f9fa; color: #333; }
        .hero-section { background: linear-gradient(135deg, var(--gov-blue), #00509d); color: white; padding: 60px 0; }
        .case-card { cursor: pointer; transition: all 0.3s ease; border-left: 5px solid #ccc; margin-bottom: 10px; }
        .case-card:hover { transform: translateX(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .high-gl { border-left-color: var(--gov-green); }
        .low-gl { border-left-color: var(--gov-red); }
        .diagnostic-box { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-top: 15px; display: none; }
        .prescription-box { background: #e7f3ff; border: 1px solid #b6d4fe; border-radius: 8px; padding: 20px; margin-top: 15px; display: none; }
        .gl-value { font-weight: bold; font-size: 1.2rem; }
        .formula-display { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px; text-align: center; }
        footer { background: #212529; color: white; padding: 30px 0; margin-top: 60px; }
    </style>
</head>
<body>

<section class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">GFI 治理合法性指數驗證</h1>
        <p class="lead">18 個國際案例研究：從卓越治理到政策暴力</p>
        <p class="small">作者：徐萍 (Ping Xu) | 《治理物理學》實證框架</p>
    </div>
</section>

<div class="container my-5">
    <div class="formula-display shadow-sm">
        <h4>核心計算公式</h4>
        \[ GL = \frac{Fs \times Vn}{Pd \times Cf} \]
        <p class="text-muted small">Legitimacy = (成功率 × 戰略價值) / (痛苦時數 × 認知摩擦)</p>
    </div>

    <h3 class="mb-4">案例清單 (點擊個別查看診斷與處方)</h3>
    <div id="cases-container">
        </div>
</div>

<footer>
    <div class="container text-center">
        <p>GFI Flow Intelligence | Boston, MA | 2026</p>
        <p class="small opacity-50">&copy; Ping Xu. [cite_start]基於《為什麼好政策反而令人痛苦?》手稿數據進行診斷 [cite: 36, 501]</p>
    </div>
</footer>

<script>
const casesData = [
    { id: 1, name: "芬蘭教育體系 (Finland Education)", gl: 3.13, type: "high", diag: "行政負擔由機構承擔而非個人。數據自動共享，家長每年 Pd 僅 2.5 小時。", pre: "原則：行政負擔 Flow Uphill。持續維持單一資料庫整合。" },
    { id: 2, name: "盧安達健康保險 (Rwanda Health)", gl: 5.08, type: "high", diag: "資源受限逼出極簡設計。社區分類與彩色貼紙機制，Pd 僅 1.2 小時。", pre: "原則：資源約束強化設計。將此模式擴展至其他低資源行政領域。" },
    { id: 3, name: "愛沙尼亞數位政府 (Estonia Digital)", gl: 10.54, type: "high", diag: "數位極致化，Fs 0.97。但 SRF 1.8 顯示其在斷網危機時的脆弱性。", pre: "建議：增加強制性類比備援（向南韓模式學習）以降低 SRF。" },
    { id: 7, name: "巴西家庭補助金 (Bolsa Família)", gl: 2.64, type: "high", diag: "利用統一資料庫 (Cadastro Único) 讓 5000 萬人無感獲得補助。Pd 3.3, Cf 1.8。", pre: "原則：基礎設施重用。將支付系統與現有銀行網絡掛鉤以降低佈署成本。" },
    { id: 8, name: "南韓數位身份證 (S. Korea ID)", gl: 4.12, type: "high", diag: "數位與類比並行的雙軌架構。SRF 僅 1.1，危機時韌性極強。", pre: "原則：韌性勝過峰值效率。定期進行類比備援演練。" },
    { id: 9, name: "印度 Aadhaar 生物識別", gl: 1.89, type: "high", diag: "十億級規模的轉型治理。雖然 Fs 為 0.77，但消除了 $150 億的資源流失。", pre: "處方：提升生物識別失敗時的備援通道，降低弱勢族群的 Cf。" },
    { id: 10, name: "美國學生貸款豁免 (U.S. [cite_start]Loan)", gl: 0.006, type: "low", diag: "每 1 單位收益製造 150 單位痛苦。Pd 100小時, Cf 4.5 [cite: 73, 77][cite_start]。", pre: "處方：將「主動申請」改為「自動豁免」。聯通 IRS 數據自動判定資格 [cite: 81, 85]。" },
    [cite_start]{ id: 13, name: "印度廢鈔令 (Demonetization)", gl: 0.023, type: "low", diag: "「無麻醉金融外科手術」。Pd 48小時 (集體創傷), Cf 4.0 [cite: 228, 235][cite_start]。", pre: "處方：分階段實施並設立過渡期。利用郵政網絡啟動「零門檻簡易帳戶」 [cite: 237, 242]。" },
    [cite_start]{ id: 17, name: "澳洲洪水補助 (Australia Flood)", gl: 0.078, type: "low", diag: "要求災民在廢墟中證明災難。Pd 12小時, Cf 4.2 [cite: 466, 471][cite_start]。", pre: "處方：啟動「基於地理的自動預審」。利用衛星影像自動識別受災戶撥款 [cite: 474, 478]。" },
    [cite_start]{ id: 18, name: "加拿大護照更新 (Passport Crisis)", gl: 0.032, type: "low", diag: "計劃性失敗。需求海嘯下 Pd 飆升至 50 小時, Cf 3.8 [cite: 525, 527][cite_start]。", pre: "處方：需求預測與自動換發。對低風險人群實行一鍵確認換發 [cite: 533, 545]。" },
    [cite_start]{ id: 11, name: "英國統一福利金 (UK UC)", gl: 0.06, type: "low", diag: "慢性消耗。Pd 20小時, Cf 3.8。系統性排斥弱勢群體 [cite: 125, 127][cite_start]。", pre: "處方：設立「生命線」代辦通道。強制對數字弱勢者進行 Cf 壓力測試 [cite: 133, 143]。" },
    [cite_start]{ id: 12, name: "臺灣疫苗預約平台 (長者)", gl: 0.16, type: "low", diag: "逆向保護。長者 Cf 高達 5.5。數位牆擋住了最需要保護的人 [cite: 171, 177][cite_start]。", pre: "處方：主動出擊登記。利用健保資料庫由志工電話聯繫完成預約 [cite: 189, 192]。" },
    [cite_start]{ id: 15, name: "日本 MyNumber 卡 (推廣期)", gl: 0.15, type: "low", diag: "信任赤字。獲取過程 Pd 6小時, Cf 4.0。公民對數據安全性極度不信任 [cite: 344, 353][cite_start]。", pre: "處方：「郵差到家」代辦服務。建立透明數據契約與強力隱私懲罰機制 [cite: 361, 364]。" },
    [cite_start]{ id: 16, name: "南非社會補助系統 (南非)", gl: 0.066, type: "low", diag: "生存賭博。故障期 Fs 暴跌至 0.5。Pd 16小時 [cite: 408, 414][cite_start]。", pre: "處方：多供應商並行運作消除單點故障。推行手機錢包免排隊提現 [cite: 419, 425]。" },
    [cite_start]{ id: 14, name: "歐盟 GDPR", gl: 0.4, type: "low", diag: "隱私疲勞。Pd 15小時/年, Cf 3.2。同意彈窗淪為形式 [cite: 285, 292][cite_start]。", pre: "處方：推行瀏覽器層級的「全局隱私偏好」標準。打擊欺騙性暗黑模式 [cite: 298, 307]。" },
    { id: 4, name: "新加坡公共住房 (HDB)", gl: 0.02, type: "low", diag: "成功後的複雜性陷阱。Pd 120小時。過度精細化的規則積累。", pre: "處方：定期進行「簡化重置」。每新增一條規則必須移除兩條舊規則。" },
    { id: 5, name: "德國能源轉型 (Energiewende)", gl: 0.056, type: "low", diag: "許可證陷阱。Pd 28小時。自 1991 年起 GL 下降了 83%。", pre: "處方：設定「複雜度預算」。強制實施行政流程的落日條款。" },
    { id: 6, name: "紐西蘭福祉預算 (Wellbeing)", gl: 0.013, type: "low", diag: "指標瘋狂。247 項指標導致 Pd 45小時。GL 下降了 94%。", pre: "處方：回歸核心指標。數據收集應自動化，避免基層人員重擔。" }
];

function renderCases() {
    const container = document.getElementById('cases-container');
    casesData.forEach(c => {
        const card = document.createElement('div');
        card.className = `card case-card p-3 ${c.type === 'high' ? 'high-gl' : 'low-gl'}`;
        card.innerHTML = `
            <div class="d-flex justify-content-between align-items-center">
                <span>${c.name}</span>
                <span class="gl-value ${c.type === 'high' ? 'text-success' : 'text-danger'}">GL: ${c.gl}</span>
            </div>
            <div id="diag-${c.id}" class="diagnostic-box shadow-sm">
                <strong>[診斷細節]</strong><br>${c.diag}
                <div id="pre-${c.id}" class="prescription-box mt-3">
                    <strong>[優化處方]</strong><br>${c.pre}
                </div>
            </div>
        `;
        card.onclick = () => toggleDetails(c.id);
        container.appendChild(card);
    });
}

function toggleDetails(id) {
    const diag = document.getElementById(`diag-${id}`);
    const pre = document.getElementById(`pre-${id}`);
    if (diag.style.display === 'block') {
        diag.style.display = 'none';
        pre.style.display = 'none';
    } else {
        diag.style.display = 'block';
        setTimeout(() => { pre.style.display = 'block'; }, 300);
    }
}

document.addEventListener('DOMContentLoaded', renderCases);
</script>

</body>
</html>
