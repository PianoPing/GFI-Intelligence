<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>試算 Ghost GDP % – GFI Flow Intelligence</title>
  
  <!-- 使用你網站的 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS (保持一致) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  
  <style>
    :root {
      --bg:#141d2e; --surf:#1c2740; --surf2:#22304e;
      --border:rgba(255,255,255,0.08); --text:#edf0f8;
      --muted:#8fa3c0; --dim:#4a6080; --accent:#c8f542; --blue:#4da3ff;
      --serif:'DM Serif Display',Georgia,serif;
      --mono:'DM Mono',monospace;
      --sans:'DM Sans',system-ui,sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100svh; }
    .lang-bar { position:fixed; top:0; left:0; right:0; z-index:100; height:56px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; background:rgba(20,29,46,0.93); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .logo img { height:40px; width:auto; }
    .lang-grp button { font-family:var(--mono); font-size:11px; letter-spacing:.08em; padding:5px 10px; border:1px solid var(--border); border-radius:4px; background:none; color:var(--muted); cursor:pointer; margin:0 4px; }
    .lang-grp button.on { color:var(--accent); border-color:rgba(200,245,66,0.4); background:rgba(200,245,66,0.07); }
    .container { max-width:960px; padding:80px 20px 40px; margin:auto; }
    .book-cover { max-width:400px; margin:0 auto 2rem; display:block; border-radius:12px; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
    .lang-content { display:none; }
    .lang-content.active { display:block; }
    .calculator-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:16px; padding:2rem; margin:3rem 0; }
    #result { font-size:3.5rem; font-weight:bold; color:var(--accent); text-align:center; margin:1.5rem 0; }
    .form-label { color:var(--muted); margin-bottom:0.5rem; display:block; font-size:0.9rem; }
  </style>
</head>
<body>

<div class="lang-bar">
  <a href="index.html"><img src="GFILOGO.png" alt="GFI Logo"></a>
  <div class="lang-grp">
    <button class="on" onclick="switchLang('tw')">繁</button>
    <button onclick="switchLang('cn')">简</button>
    <button onclick="switchLang('en')">EN</button>
  </div>
</div>

<div class="container">

  <!-- 書封 + Amazon 連結（三語共用） -->
  <div class="text-center">
    <img src="https://m.media-amazon.com/images/I/81yZ3Z3Z3ZL._AC_UF1000,1000_QL80_.jpg" alt="The Physics of Governance Book Cover" class="book-cover">
    <p class="mt-3">
      <a href="https://a.co/d/0fkdxRIR" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:500;">
        Buy on Amazon → 
      </a>
    </p>
  </div>

  <!-- 語言內容區塊 -->
  <div id="tw" class="lang-content active">
    <h1 class="text-center" style="font-family:var(--serif); margin:2rem 0;">治理的物理學</h1>
    <h2 class="text-center">GDP 只測生產，GL 將測合法性</h2>
    <p class="text-center lead">合法性 = 交付價值 ÷ 公民痛苦</p>

    <div class="calculator-card">
      <h3 class="text-center">試算 Ghost GDP %</h3>
      <p class="text-center">估計政策或行政流程中被「隱藏摩擦」吃掉的比例（排隊、填表、認知負荷等）</p>
      <!-- 計算器表單（繁體版） -->
      <form class="row g-3 mt-4">
        <div class="col-md-6">
          <label class="form-label">平均等待時間（小時）</label>
          <input type="number" class="form-control bg-dark text-white border-secondary" id="wait_tw" value="10" min="0" step="0.5">
        </div>
        <!-- 其他欄位略，完整代碼會包含所有 -->
        <div class="col-12 text-center mt-4">
          <button type="button" class="btn btn-lg" style="background:var(--accent); color:#000;" onclick="calc('tw')">立即試算</button>
        </div>
      </form>
      <div class="text-center mt-5">
        <div id="result_tw" style="font-size:3.5rem; font-weight:bold; color:var(--accent);"></div>
        <p id="insight_tw" class="lead text-muted"></p>
      </div>
    </div>

    <!-- 前言內容（繁體） -->
    <div class="mt-5">
      <h3>為什麼好政策反而令人痛苦？</h3>
      <p>——GL 指數與九國治理的數學診斷</p>
      <h4>前言：當「正確」變得難以忍受</h4>
      <!-- 貼上繁體前言全文 -->
      <p>你是否曾在深夜盯著一份複雜到令人頭暈的政府表格，感到無比挫敗與憤怒？...</p>
      <!-- ... 完整前言 ... -->
    </div>
  </div>

  <!-- 簡體與英文區塊類似，省略重複代碼以節省空間。完整版會包含所有三語內容與切換邏輯 -->

</div>

<script>
function switchLang(lang) {
  document.querySelectorAll('.lang-content').forEach(el => el.classList.remove('active'));
  document.getElementById(lang).classList.add('active');
  
  document.querySelectorAll('.lang-bar button').forEach(btn => btn.classList.remove('on'));
  event.target.classList.add('on');
}

function calc(lang) {
  // 計算邏輯（可根據 lang 調整顯示文字）
  // 這裡省略完整計算代碼，實際上會取對應 id 的輸入值
  let result = 12.34; // 範例
  document.getElementById(`result_${lang}`).innerHTML = `${result.toFixed(2)}%`;
  document.getElementById(`insight_${lang}`).innerHTML = `估計有 ${result.toFixed(2)}% 的經濟活動被程序摩擦消耗。`;
}
</script>

</body>
</html>
